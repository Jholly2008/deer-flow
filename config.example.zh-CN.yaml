#   # 用于 thread/message 管理的 LangGraph Server URL（默认：http://localhost:2024）
#   # Docker 部署时，请使用 Docker 服务名而不是 localhost：
#   #   langgraph_url: http://langgraph:2024
#   #   gateway_url: http://gateway:8001
#   langgraph_url: http://localhost:2024
#   # 用于 /models、/memory 等辅助查询的 Gateway API URL（默认：http://localhost:8001）
#   gateway_url: http://localhost:8001
#   #
#   # Docker Compose 说明：
#   # 如果 channels 运行在 gateway 容器内，请使用容器 DNS 名称，
#   # 而不是 localhost，例如：
#   # langgraph_url: http://langgraph:2024
#   # gateway_url: http://gateway:8001
#   # 也可以设置 DEER_FLOW_CHANNELS_LANGGRAPH_URL / DEER_FLOW_CHANNELS_GATEWAY_URL。
#
#   # 可选：所有 IM 渠道的默认移动端/session 设置。
#   session:
#     assistant_id: lead_agent  # 或自定义 agent 名称；自定义 agent 会通过 lead_agent + agent_name 路由
#     config:
#       recursion_limit: 100
