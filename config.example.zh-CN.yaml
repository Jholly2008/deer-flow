# ============================================================================
# Guardrails 配置
# ============================================================================
# 可选：工具调用执行前授权。
# 启用后，每个工具调用都会先经过配置的 provider 评估，再决定是否执行。
# 有三种选择：内置 allowlist、OAP policy provider 或自定义 provider。
# 详见 backend/docs/GUARDRAILS.md。
#
# Provider 通过类路径加载，方式与 models/tools 中的 resolve_variable 相同。

# --- 选项 1：内置 AllowlistProvider（零额外依赖） ---
# guardrails:
#   enabled: true
#   provider:
#     use: deerflow.guardrails.builtin:AllowlistProvider
#     config:
#       denied_tools: ["bash", "write_file"]

# --- 选项 2：OAP passport provider（开放标准，可接入任意实现） ---
#   Open Agent Passport (OAP) 规范定义了 passport 格式和决策码。
#   任意兼容 OAP 的 provider 都可使用。下面示例使用 APort（参考实现）：
#     pip install aport-agent-guardrails && aport setup --framework deerflow
# guardrails:
#   enabled: true
#   provider:
#     use: aport_guardrails.providers.generic:OAPGuardrailProvider

# --- 选项 3：自定义 provider（任意带 evaluate/aevaluate 方法的类） ---
# guardrails:
#   enabled: true
#   provider:
#     use: my_package:MyGuardrailProvider
#     config:
#       key: value

# ============================================================================
# 熔断器配置
# ============================================================================
# LLM 调用熔断器用于防止反复请求失败的 provider。
# 连续失败达到阈值后，后续调用会快速失败，直到进入恢复阶段。
#
# 适用场景：
# - provider 故障时避免触发限流或封禁。
# - 减少重试循环导致的资源耗尽。
# - 当 LLM 服务不可用时实现更平滑的降级。

# circuit_breaker:
#   # 打开熔断前允许的连续失败次数（默认：5）
#   failure_threshold: 5
#   # 尝试恢复前等待的秒数（默认：60）
#   recovery_timeout_sec: 60
